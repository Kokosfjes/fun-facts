<!doctype html>
<html lang="no">
<head>
<meta charset="utf-8" />
<title>Fun Facts — Multiplayer</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
  :root { color-scheme: dark; --bg:#0e1a2b; --panel:#1a2c45; --accent:#ffcc4a; --good:#5cd97a; --bad:#e26464; }
  * { box-sizing: border-box; }
  body { margin:0; font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color:#fff; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:16px; }
  .app { width: 100%; max-width: 640px; }
  .card { background: var(--panel); border-radius: 16px; padding: 24px; box-shadow: 0 12px 40px rgba(0,0,0,.4); }
  h1 { margin: 0 0 8px; font-size: 28px; color: var(--accent); }
  h2 { margin: 0 0 12px; font-size: 22px; }
  p.sub { margin: 0 0 20px; color: #aac; }
  input[type=text], input[type=number] { width:100%; padding: 14px 16px; font-size: 18px; border-radius: 10px; border: 2px solid #345; background:#0e1a2b; color:#fff; outline:none; }
  input:focus { border-color: var(--accent); }
  button { width:100%; padding: 14px; font-size: 18px; font-weight:600; border-radius: 10px; border:0; background: var(--accent); color:#222; cursor:pointer; margin-top: 12px; transition: transform .05s; }
  button:hover { filter: brightness(1.1); }
  button:active { transform: scale(.98); }
  button.ghost { background: transparent; color:#aac; border: 2px solid #345; }
  button:disabled { opacity:.4; cursor:not-allowed; }
  .row { display:flex; gap:8px; }
  .players { list-style:none; padding:0; margin: 0 0 12px; }
  .players li { background:#0e1a2b; padding: 10px 14px; border-radius:8px; margin-bottom:6px; display:flex; justify-content:space-between; align-items:center; }
  .players li .status { font-size: 13px; color: #aac; }
  .players li .status.done { color: var(--good); }
  .question { font-size: 24px; font-weight:700; line-height:1.3; margin: 16px 0 24px; text-align:center; min-height: 80px; display:flex; align-items:center; justify-content:center; }
  .reveal-list { list-style:none; padding:0; margin: 0; }
  .reveal-list li { background:#0e1a2b; padding: 14px 16px; border-radius:10px; margin-bottom:8px; display:flex; justify-content:space-between; font-size:18px; }
  .reveal-list .answer { color: var(--accent); font-weight:700; }
  .badge { display:inline-block; padding:2px 8px; border-radius:6px; font-size:12px; margin-left:6px; }
  .badge.hi { background: var(--good); color:#0e1a2b; }
  .badge.lo { background: var(--bad); }
  .roomcode { font-size: 48px; font-weight:800; color: var(--accent); letter-spacing: 6px; text-align:center; padding: 16px; background:#0e1a2b; border-radius: 12px; margin: 12px 0; font-family: ui-monospace, monospace; }
  .progress { color:#aac; font-size:14px; text-align:center; margin-bottom:12px; }
  .err { background: var(--bad); color:#fff; padding: 10px; border-radius: 8px; margin-top: 12px; text-align:center; }
  .info { color:#aac; font-size:14px; text-align:center; margin: 8px 0; }
  .badge-host { background: var(--accent); color:#222; font-size:11px; padding: 2px 6px; border-radius:4px; margin-left: 6px; font-weight: 700; }
</style>
</head>
<body>
<div class="app"><div class="card" id="root"></div></div>

<script>
// ============= QUESTIONS =============
const QUESTIONS = [
  { type:'scale', text:'Hvor glad er du i sterk mat? (1-100)', unit:'', min:1, max:100 },
  { type:'scale', text:'Hvor flink er du til å lyve? (1-100)', unit:'', min:1, max:100 },
  { type:'scale', text:'Hvor sjenert er du? (1-100)', unit:'', min:1, max:100 },
  { type:'scale', text:'Hvor sannsynlig er det at du overlever en zombieapokalypse? (1-100)', unit:'%', min:1, max:100 },
  { type:'scale', text:'Hvor god er du til å danse? (1-100)', unit:'', min:1, max:100 },
  { type:'scale', text:'Hvor mye liker du å være alene? (1-100)', unit:'', min:1, max:100 },
  { type:'scale', text:'Hvor flink er du til å lage mat? (1-100)', unit:'', min:1, max:100 },
  { type:'scale', text:'Hvor lett blir du sjalu? (1-100)', unit:'', min:1, max:100 },
  { type:'scale', text:'Hvor godt synger du? (1-100)', unit:'', min:1, max:100 },
  { type:'scale', text:'Hvor ofte sjekker du mobilen? (1-100)', unit:'', min:1, max:100 },
  { type:'scale', text:'Hvor romantisk er du? (1-100)', unit:'', min:1, max:100 },
  { type:'scale', text:'Hvor flink er du til å holde på en hemmelighet? (1-100)', unit:'', min:1, max:100 },
  { type:'number', text:'Hvor mange timer søvn fikk du i går?', unit:'timer' },
  { type:'number', text:'Hvor mange land har du besøkt?', unit:'land' },
  { type:'number', text:'Hvor mange kopper kaffe drikker du per uke?', unit:'kopper' },
  { type:'number', text:'Hvor mange minutter bruker du på å gjøre deg klar om morgenen?', unit:'min' },
  { type:'number', text:'Hvor gammel var du første gang du smakte alkohol?', unit:'år' },
  { type:'number', text:'Hvor mange seriøse forhold har du hatt?', unit:'' },
  { type:'number', text:'Hvor mange bøker leser du i året?', unit:'bøker' },
  { type:'number', text:'Hvor mange minutter trener du per uke?', unit:'min' },
  { type:'number', text:'Hvor mange ganger har du flyttet i livet?', unit:'ganger' },
  { type:'number', text:'Hvor langt (km) er det lengste du har løpt?', unit:'km' },
  { type:'number', text:'Hvor mange timer skjermtid har du per dag?', unit:'timer' },
  { type:'number', text:'Hvor mange kjæledyr har du hatt totalt?', unit:'' },
  { type:'number', text:'Hvor mange ganger har du vært forelsket?', unit:'' },
  { type:'number', text:'Hvor mange par sko eier du?', unit:'par' },
];

// ============= STATE =============
const ROOM_PREFIX = 'funfacts-vb-';
const state = {
  role: null,           // 'host' | 'player' | null
  screen: 'home',
  myName: '',
  myId: null,
  hostConn: null,       // for player: conn to host
  peer: null,
  // host-only
  roomCode: null,
  conns: new Map(),     // playerId -> {conn, name, answered}
  hostState: 'lobby',   // lobby | answering | reveal | done
  question: null,
  answers: new Map(),   // playerName -> value
  usedQuestions: new Set(),
  myAnswer: null,
  // player-only mirror
  lobbyPlayers: [],
  revealData: null,
  errMsg: '',
};

const root = document.getElementById('root');

// ============= NETWORKING =============
function makeRoomCode() {
  const letters = 'ABCDEFGHJKMNPQRSTUVWXYZ23456789';
  let s = '';
  for (let i = 0; i < 4; i++) s += letters[Math.floor(Math.random()*letters.length)];
  return s;
}

function startHost() {
  const code = makeRoomCode();
  state.roomCode = code;
  state.peer = new Peer(ROOM_PREFIX + code);
  state.peer.on('open', id => {
    state.myId = id;
    render();
  });
  state.peer.on('error', err => {
    if (err.type === 'unavailable-id') {
      // retry with a new code
      state.peer.destroy();
      startHost();
    } else {
      state.errMsg = 'Nettverksfeil: ' + err.type;
      render();
    }
  });
  state.peer.on('connection', conn => {
    conn.on('open', () => {
      conn.on('data', data => onHostData(conn, data));
      conn.on('close', () => removePlayer(conn.peer));
    });
  });
}

function onHostData(conn, data) {
  if (data.type === 'join') {
    // Reject duplicate names
    const existing = [...state.conns.values()].some(c => c.name === data.name);
    if (existing || state.conns.size >= 9) {
      conn.send({ type:'rejected', reason: existing ? 'Navnet er tatt' : 'Rommet er fullt' });
      conn.close();
      return;
    }
    state.conns.set(conn.peer, { conn, name: data.name, answered: false });
    broadcastLobby();
  } else if (data.type === 'answer') {
    const p = state.conns.get(conn.peer);
    if (!p || state.hostState !== 'answering') return;
    state.answers.set(p.name, data.value);
    p.answered = true;
    broadcastLobby();
    checkAllAnswered();
  }
}

function removePlayer(peerId) {
  state.conns.delete(peerId);
  broadcastLobby();
  if (state.hostState === 'answering') checkAllAnswered();
}

function broadcastLobby() {
  const players = [
    { name: state.myName, isHost: true, answered: state.myAnswer != null },
    ...[...state.conns.values()].map(c => ({ name: c.name, isHost: false, answered: c.answered })),
  ];
  state.lobbyPlayers = players;
  send({ type:'lobby', players });
  if (state.role === 'host') render();
}

function send(msg) {
  for (const { conn } of state.conns.values()) {
    try { conn.send(msg); } catch {}
  }
}

function checkAllAnswered() {
  const allDone = [...state.conns.values()].every(c => c.answered) && state.myAnswer != null;
  if (allDone) doReveal();
}

function hostStartGame() {
  if (state.conns.size < 1) return;
  nextQuestion();
}

function nextQuestion() {
  if (state.usedQuestions.size >= QUESTIONS.length) state.usedQuestions.clear();
  const candidates = QUESTIONS.map((q,i)=>({q,i})).filter(x => !state.usedQuestions.has(x.i));
  const pick = candidates[Math.floor(Math.random()*candidates.length)];
  state.usedQuestions.add(pick.i);
  state.question = pick.q;
  state.answers = new Map();
  state.myAnswer = null;
  for (const c of state.conns.values()) c.answered = false;
  state.hostState = 'answering';
  send({ type:'question', question: pick.q });
  broadcastLobby();
  render();
}

function doReveal() {
  const sorted = [...state.answers.entries()].sort((a,b)=>a[1]-b[1]);
  state.revealData = { sorted, question: state.question };
  state.hostState = 'reveal';
  send({ type:'reveal', sorted, question: state.question });
  render();
}

function endGame() {
  state.hostState = 'done';
  send({ type:'done' });
  render();
}

// ---- player side ----
function joinRoom(code, name) {
  state.peer = new Peer();
  state.peer.on('open', () => {
    const conn = state.peer.connect(ROOM_PREFIX + code, { reliable: true });
    state.hostConn = conn;
    conn.on('open', () => {
      conn.send({ type:'join', name });
      conn.on('data', data => onPlayerData(data));
      conn.on('close', () => {
        state.errMsg = 'Mistet kontakt med rommet';
        state.screen = 'home';
        render();
      });
    });
  });
  state.peer.on('error', err => {
    state.errMsg = err.type === 'peer-unavailable' ? 'Rommet finnes ikke' : 'Feil: ' + err.type;
    state.screen = 'home';
    render();
  });
}

function onPlayerData(data) {
  if (data.type === 'rejected') {
    state.errMsg = data.reason;
    state.screen = 'home';
    render();
  } else if (data.type === 'lobby') {
    state.lobbyPlayers = data.players;
    if (state.screen !== 'answer' && state.screen !== 'reveal') {
      state.screen = 'lobby';
    } else {
      // just refresh sidebar info if any
      render();
      return;
    }
    render();
  } else if (data.type === 'question') {
    state.question = data.question;
    state.myAnswer = null;
    state.screen = 'answer';
    render();
  } else if (data.type === 'reveal') {
    state.revealData = { sorted: data.sorted, question: data.question };
    state.screen = 'reveal';
    render();
  } else if (data.type === 'done') {
    state.screen = 'done';
    render();
  }
}

function submitAnswer(value) {
  if (state.role === 'host') {
    state.myAnswer = value;
    state.answers.set(state.myName, value);
    broadcastLobby();
    checkAllAnswered();
  } else {
    state.hostConn.send({ type:'answer', value });
    state.myAnswer = value;
  }
  render();
}

// ============= RENDERERS =============
function render() {
  root.innerHTML = '';
  if (state.role === 'host') renderHost();
  else if (state.role === 'player') renderPlayer();
  else renderHome();
}

function renderHome() {
  const w = el('div');
  w.innerHTML = `
    <h1>🎉 Fun Facts</h1>
    <p class="sub">Spill med vennene dine i sanntid. Én vert lager et rom, andre blir med via romkode.</p>
    <button id="host">Lag nytt rom (vert)</button>
    <button id="join" class="ghost">Bli med i rom</button>
    ${state.errMsg ? `<div class="err">${escapeHtml(state.errMsg)}</div>` : ''}
  `;
  root.append(w);
  state.errMsg = '';
  w.querySelector('#host').onclick = () => askName('host');
  w.querySelector('#join').onclick = () => state.screen='joinForm', renderJoinForm();
}

function askName(role) {
  const w = el('div');
  w.innerHTML = `
    <h2>${role==='host'?'Lag rom':'Bli med'}</h2>
    <p class="sub">Hva heter du?</p>
    <input type="text" id="n" maxlength="20" placeholder="Ditt navn" />
    <button id="ok" disabled>Fortsett</button>
    <button id="back" class="ghost">Tilbake</button>
  `;
  root.innerHTML = ''; root.append(w);
  const n = w.querySelector('#n'), ok = w.querySelector('#ok');
  n.focus();
  n.oninput = () => ok.disabled = !n.value.trim();
  function go() {
    const name = n.value.trim();
    if (!name) return;
    state.myName = name;
    if (role === 'host') {
      state.role = 'host';
      state.hostState = 'lobby';
      startHost();
      render();
    }
  }
  n.onkeydown = e => { if (e.key === 'Enter') go(); };
  w.querySelector('#ok').onclick = go;
  w.querySelector('#back').onclick = () => { state.role=null; state.screen='home'; render(); };
}

function renderJoinForm() {
  const w = el('div');
  w.innerHTML = `
    <h2>Bli med i rom</h2>
    <p class="sub">Skriv inn 4-bokstavskoden fra verten.</p>
    <input type="text" id="code" maxlength="4" placeholder="ABCD" style="text-transform:uppercase; letter-spacing:8px; text-align:center; font-size:28px;" />
    <input type="text" id="name" maxlength="20" placeholder="Ditt navn" style="margin-top:8px;" />
    <button id="ok" disabled>Bli med</button>
    <button id="back" class="ghost">Tilbake</button>
  `;
  root.innerHTML = ''; root.append(w);
  const code = w.querySelector('#code'), name = w.querySelector('#name'), ok = w.querySelector('#ok');
  function check() { ok.disabled = !(code.value.trim().length === 4 && name.value.trim()); }
  code.oninput = () => { code.value = code.value.toUpperCase().replace(/[^A-Z0-9]/g,''); check(); };
  name.oninput = check;
  code.focus();
  function go() {
    if (ok.disabled) return;
    state.myName = name.value.trim();
    state.role = 'player';
    state.screen = 'connecting';
    joinRoom(code.value.trim(), state.myName);
    render();
  }
  ok.onclick = go;
  name.onkeydown = e => { if (e.key==='Enter') go(); };
  w.querySelector('#back').onclick = () => { state.role=null; state.screen='home'; render(); };
}

function renderHost() {
  if (!state.myId) { renderConnecting(); return; }
  if (state.hostState === 'lobby') renderLobby();
  else if (state.hostState === 'answering') renderAnswerOrWait();
  else if (state.hostState === 'reveal') renderReveal();
  else if (state.hostState === 'done') renderDone();
}

function renderPlayer() {
  if (state.screen === 'connecting') return renderConnecting();
  if (state.screen === 'lobby') return renderLobby();
  if (state.screen === 'answer') return renderAnswerOrWait();
  if (state.screen === 'reveal') return renderReveal();
  if (state.screen === 'done') return renderDone();
  if (state.screen === 'joinForm') return renderJoinForm();
  renderConnecting();
}

function renderConnecting() {
  const w = el('div');
  w.innerHTML = `<h2>Kobler til…</h2><p class="info">Hvis dette tar lang tid, prøv igjen.</p>`;
  root.append(w);
}

function renderLobby() {
  const isHost = state.role === 'host';
  const players = state.lobbyPlayers.length ? state.lobbyPlayers
    : [{ name: state.myName, isHost: true, answered: false }];
  const w = el('div');
  w.innerHTML = `
    <h2>${isHost ? 'Ditt rom' : 'Venter på vert…'}</h2>
    ${isHost ? `
      <p class="sub">Del koden med vennene dine. Opptil 10 spillere totalt.</p>
      <div class="roomcode">${state.roomCode}</div>
      <p class="info">De går til samme nettside og trykker «Bli med i rom».</p>
    ` : `<p class="info">Du er med! Vent til verten starter spillet.</p>`}
    <h2 style="margin-top:24px;">Spillere (${players.length})</h2>
    <ul class="players">
      ${players.map(p => `<li><span>${escapeHtml(p.name)}${p.isHost?'<span class="badge-host">VERT</span>':''}</span></li>`).join('')}
    </ul>
    ${isHost ? `<button id="start" ${players.length<2?'disabled':''}>Start spillet</button>` : ''}
    <button id="leave" class="ghost">Forlat</button>
  `;
  root.append(w);
  if (isHost) w.querySelector('#start').onclick = () => hostStartGame();
  w.querySelector('#leave').onclick = () => location.reload();
}

function renderAnswerOrWait() {
  const q = state.question;
  const isHost = state.role === 'host';
  const allPlayers = isHost ? state.lobbyPlayers : state.lobbyPlayers;
  const waitingFor = allPlayers.filter(p => !p.answered).map(p => p.name);
  const myDone = state.myAnswer != null;
  const w = el('div');
  if (myDone) {
    w.innerHTML = `
      <p class="progress">Venter på de andre…</p>
      <div class="question">${escapeHtml(q.text)}</div>
      <p class="info">Ditt svar er låst inn: <b style="color:var(--accent)">${formatNum(state.myAnswer)}${q.unit?' '+escapeHtml(q.unit):''}</b></p>
      <ul class="players">
        ${allPlayers.map(p => `<li><span>${escapeHtml(p.name)}${p.isHost?'<span class="badge-host">VERT</span>':''}</span><span class="status ${p.answered?'done':''}">${p.answered?'✓ svart':'…tenker'}</span></li>`).join('')}
      </ul>
    `;
  } else {
    const hint = q.type === 'scale' ? `Tall mellom ${q.min} og ${q.max}` : 'Skriv et tall';
    w.innerHTML = `
      <div class="question">${escapeHtml(q.text)}</div>
      <input type="number" id="val" inputmode="decimal" placeholder="${hint}" ${q.type==='scale'?`min="${q.min}" max="${q.max}"`:''} />
      <button id="ok">Lås inn svar</button>
      <p class="info">Bare svaret ditt sendes — ingen ser tallet før alle har svart.</p>
    `;
  }
  root.append(w);
  if (!myDone) {
    const inp = w.querySelector('#val');
    inp.focus();
    function go() {
      const v = parseFloat(inp.value);
      if (Number.isNaN(v)) { inp.focus(); return; }
      if (q.type === 'scale' && (v < q.min || v > q.max)) { inp.focus(); return; }
      submitAnswer(v);
    }
    w.querySelector('#ok').onclick = go;
    inp.onkeydown = e => { if (e.key==='Enter') go(); };
  }
}

function renderReveal() {
  const isHost = state.role === 'host';
  const { sorted, question: q } = state.revealData;
  const minVal = sorted[0][1], maxVal = sorted[sorted.length-1][1];
  const w = el('div');
  w.innerHTML = `
    <div class="question">${escapeHtml(q.text)}</div>
    <ul class="reveal-list">
      ${sorted.map(([name,val]) => {
        const badge = minVal === maxVal ? ''
          : val === minVal ? '<span class="badge lo">lavest</span>'
          : val === maxVal ? '<span class="badge hi">høyest</span>' : '';
        return `<li><span>${escapeHtml(name)} ${badge}</span><span class="answer">${formatNum(val)}${q.unit?' '+escapeHtml(q.unit):''}</span></li>`;
      }).join('')}
    </ul>
    ${isHost ? `<button id="next">Neste spørsmål</button><button id="end" class="ghost">Avslutt</button>` : `<p class="info">Venter på at verten starter neste runde…</p>`}
  `;
  root.append(w);
  if (isHost) {
    w.querySelector('#next').onclick = () => nextQuestion();
    w.querySelector('#end').onclick = () => endGame();
  }
}

function renderDone() {
  const w = el('div');
  w.innerHTML = `
    <h1>Takk for spillet! 👋</h1>
    <p class="sub">Last inn siden for å spille igjen.</p>
    <button onclick="location.reload()">Start på nytt</button>
  `;
  root.append(w);
}

// ============= utils =============
function el(tag){ return document.createElement(tag); }
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function formatNum(n){ return Number.isInteger(n) ? n : Number(n.toFixed(2)); }

render();
</script>
</body>
</html>
