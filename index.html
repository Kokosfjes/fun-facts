<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown to June 17, 2026</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, sans-serif;
    background: linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #6a3093 100%);
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 1rem;
    text-align: center;
  }
  h1 {
    font-size: clamp(1.5rem, 4vw, 2.5rem);
    font-weight: 300;
    letter-spacing: 0.1em;
    margin-bottom: 2rem;
    text-transform: uppercase;
    opacity: 0.9;
  }
  .target {
    font-size: clamp(1rem, 2.5vw, 1.25rem);
    margin-bottom: 3rem;
    opacity: 0.7;
  }
  .countdown {
    display: flex;
    gap: clamp(0.5rem, 2vw, 2rem);
    flex-wrap: wrap;
    justify-content: center;
  }
  .unit {
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 1rem;
    padding: clamp(1rem, 3vw, 2rem);
    min-width: clamp(80px, 15vw, 140px);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
  }
  .value {
    font-size: clamp(2rem, 6vw, 4rem);
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }
  .label {
    font-size: clamp(0.7rem, 1.2vw, 0.9rem);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-top: 0.5rem;
    opacity: 0.8;
  }
  .ms .value { min-width: 4ch; }
  .done {
    font-size: clamp(1.5rem, 5vw, 3rem);
    margin-top: 2rem;
  }
</style>
</head>
<body>
  <h1>Counting down to</h1>
  <div class="target">June 17, 2026 &middot; 00:00:00</div>
  <div class="countdown" id="countdown">
    <div class="unit"><div class="value" id="days">0</div><div class="label">Days</div></div>
    <div class="unit"><div class="value" id="hours">0</div><div class="label">Hours</div></div>
    <div class="unit"><div class="value" id="minutes">0</div><div class="label">Minutes</div></div>
    <div class="unit ms"><div class="value" id="ms">0</div><div class="label">Milliseconds</div></div>
  </div>
  <div class="done" id="done" style="display:none;">It's here!</div>

<script>
  const target = new Date('2026-06-17T00:00:00').getTime();
  const $days = document.getElementById('days');
  const $hours = document.getElementById('hours');
  const $minutes = document.getElementById('minutes');
  const $ms = document.getElementById('ms');
  const $countdown = document.getElementById('countdown');
  const $done = document.getElementById('done');

  function tick() {
    const diff = target - Date.now();
    if (diff <= 0) {
      $countdown.style.display = 'none';
      $done.style.display = 'block';
      return;
    }
    const days = Math.floor(diff / 86400000);
    const hours = Math.floor((diff % 86400000) / 3600000);
    const minutes = Math.floor((diff % 3600000) / 60000);
    const ms = diff % 60000;
    $days.textContent = days;
    $hours.textContent = String(hours).padStart(2, '0');
    $minutes.textContent = String(minutes).padStart(2, '0');
    $ms.textContent = String(ms).padStart(5, '0');
    requestAnimationFrame(tick);
  }
  tick();
</script>
</body>
</html>
